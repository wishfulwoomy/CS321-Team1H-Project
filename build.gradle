// build.gradle
plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    mavenCentral()
}

dependencies {
    // Example dependency
    implementation 'org.slf4j:slf4j-api:1.7.30'

    // JavaFX modules
    implementation 'org.openjfx:javafx-controls:21'
    implementation 'org.openjfx:javafx-fxml:21'
    implementation 'org.openjfx:javafx-base:21'
    implementation 'org.openjfx:javafx-graphics:21'
}

application {
    mainClass.set('main.java.org.example.Main')  // Replace with your main class
}

javafx {
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

// Configure source set to match existing structure
sourceSets {
    main {
        java {
            srcDirs = ['src'] // Custom source directory
        }
    }
}


